        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        
        <script>
            function submitForm() {
                var elements = document.getElementById("myForm").elements;
                var elemsArr = Array.from(elements);
                var user = {};

                var submitStatus = document.getElementById("submitStatus");
                var userInfo = document.getElementById("userInfo");

                // Add to user object, checking for missing fields
                for (var i = 0; i < elemsArr.length; i++) {
                    if (elemsArr[i].value.length == 0) {
                        submitStatus.innerHTML = "Error: Please fill all fields and try again.";
                        userInfo.innerHTML = "";
                        return;
                    }
                    else {
                        user[elemsArr[i].name] = elemsArr[i].value;
                    }
                }

                // Check if password has special character (! or ?)
                if (!(user["pword"].includes("!") || user["pword"].includes("?"))) {
                    submitStatus.innerHTML = "Error: Please use a special character in your password and try again.";
                    userInfo.innerHTML = "";
                    return;
                }

                // Update password to asterisks
                user["pword"] = "*".repeat(user["pword"].length);

                // Show user info if valid
                submitStatus.innerHTML = "Success!";
                userInfo.innerHTML = "";
                for (const prop in user) {
                    userInfo.innerHTML += `${prop}: ${user[prop]}<br>`;
                }
            }
        </script>

        <div class="container">
            <form id="myForm">
                First Name: <input type="text" name="fname"><br>
                Last Name: <input type="text" name="lname"><br>
                Email: <input type="text" name="email"><br>
                Password (must have special characters ! or ?): <input type="text" name="pword"><br>
                Date of Birth: <input type="date" name="dob"><br>
            </form><br>
            <button onclick=submitForm()>Submit</button><br><br>
