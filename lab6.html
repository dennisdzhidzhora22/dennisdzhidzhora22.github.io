        <meta charset="utf-8">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        
        <script>
            async function getAPIData() {
                const url = 'https://brianobruno.github.io/cats.json';
                const options = {
                    method: 'GET'
                };

                const response = await fetch(url, options);
                const result = await response.text();
                const myObj = JSON.parse(result);

                return myObj;
            }

            async function populateData() {
                var myStatus = document.getElementById("myStatus");
                var myImg = document.getElementById("myImg");
                var myTableBody = document.getElementById("myTableBody");
                myStatus.innerHTML = "Loading...";

                const info = await getAPIData();

                const photo = info["catPhoto"];
                const facts = info["facts"];
                facts.sort((a, b) => a.factId - b.factId);
                var factsTableFormat = "";

                for (const fact of facts) {
                    factsTableFormat += `<tr><td>${fact["factId"]}</td><td>${fact["text"]}</td></tr>`;
                }
                
                myImg.src = photo;
                myTableBody.innerHTML = "";
                myTableBody.innerHTML = factsTableFormat;

                myStatus.innerHTML = "Done";
            }
        </script>
    </head>

    <body>

        <div class="container">
            <p>Status: <span id="myStatus">Not Triggered</span></p>
            <img class="rounded object-fit-contain" id="myImg" src="https://upload.wikimedia.org/wikipedia/commons/a/a8/NASA-Apollo8-Dec24-Earthrise.jpg" width="350px" height="350px" alt="A photo showing the Earth rising over the surface of the moon"><br>
            <table class="table" id="myTable">
                <thead>
                    <tr>
                        <th scope="col">FactId</th>
                        <th scope="col">Fact</th>
                    </tr>
                </thead>
                <tbody id="myTableBody">
                    <tr>
                        <td>None</td>

            <button class="btn btn-outline-primary" onclick=populateData()>Trigger REST API Call</button><br><br>
